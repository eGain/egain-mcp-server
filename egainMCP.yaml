openapi: 3.0.0
info:
  title: eGain Portal, Retrieve, Search, Answers APIs
  version: 1.0.0
  description: "Enterprise knowledge APIs for managing portals, searching content, retrieving AI-powered answers, and accessing content chunks for custom integrations."
  contact:
    name: eGain Inc.
    email: apisupport@egain.com
    url: https://www.egain.com/contact-us/
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
tags:
  - name: Article
    description: Article APIs
  - name: Popular Articles
    description: Popular Articles API
  - name: Portal
    description: Portal API
  - name: Search
    description: Search APIs
  - name: Suggestion
    description: Suggestion APIs
  - name: Answers
    description: APIs for Answers
  - name: Retrieve
    description: APIs for Retrieve
paths:
  /portals/{portalID}/articles/{articleID}:
    get:
      summary: Get Article by ID
      operationId: getArticleById
      tags:
        - Article
      description: "Get Article by ID\n\n## How to Use This Tool\n\n**CRITICAL**: This tool requires a `request` parameter containing the request object. All parameters must be passed inside a `request` object.\n\n**Parameter Format**: \n- Always wrap parameters in a `request` object: `{\"request\": {\"portalID\": \"PZ-9999\", \"articleID\": \"PROD-2996\"}}`\n- Required parameters:\n  - `portalID` (string) - The portal ID (format: 2-4 letter prefix + dash + 4-15 digits, e.g., \"PZ-9999\")\n    - Never ask the user to provide the portal ID if it can be discovered via getMyPortals.\n    - If portal context is missing or unclear, call getMyPortals and select the best match based on user's query.\n  - `articleID` (string) - The article ID (format: 2-4 letter prefix + dash + 4-15 digits, e.g., \"PROD-2996\")\n    - Never ask the user to provide the article ID if it can be discovered via aiSearch or getBestAnswer.\n    - If article context is missing or unclear, call aiSearch or getBestAnswer and select the best match based on user's query.\n  - `acceptLanguage` (string) - Accept-Language header value\n- Optional parameters:\n  - `Dollar_lang` (string, default: \"en-US\") - Language code\n  - `articleAdditionalAttributes` (array) - Additional article attributes to return\n  - `Dollar_customAdditionalAttributes` (string) - Custom additional attributes\n  - `accessSource` (string, default: \"article_view\") - How the article was accessed\n  - `publishViewId` (string) - Publish view ID\n  - `workflowMilestone` (string) - Workflow milestone filter\n\n**Example**: To get article \"PROD-2996\" from portal \"PZ-9999\", call with:\n```json\n{\"request\": {\"portalID\": \"PZ-9999\", \"articleID\": \"PROD-2996\", \"acceptLanguage\": \"en-US\"}}\n```\n\n**Example with optional parameters**:\n```json\n{\"request\": {\"portalID\": \"PZ-9999\", \"articleID\": \"PROD-2996\", \"Dollar_lang\": \"en-US\", \"accessSource\": \"article_view\"}}\n```\n\n## Displaying Results (MCP-Specific)\n**CRITICAL**: When this tool returns data successfully, you MUST display the article content to the user in your response. Do not silently process the data - always show the user what was returned.\n\n**What to display:**\n- Display the article `name` as the title\n- Show the article `content` or `contentText` (the full article body)\n- Display article metadata: `id`, `articleType`, `createdDate`, `modifiedDate`\n- Show `attachments` if present\n- Display `topicBreadcrumb` to show where the article is categorized\n- Include any other relevant metadata like `articleSummary`, `description`, `articleKeywords`\n- Format the article content in a readable way for the user\n\n**Example**: \"Here's the article '[Article Name]' (ID: PROD-2996): [article content]. This article is categorized under: [topic breadcrumb]...\"\n\n## Prerequisites\n- Requires a valid portal ID. If you don't have the portal ID, first call 'get-portals' to get available portals.\n- Portal ID format: 2-4 letter prefix + dash + 4-15 digits (e.g., \"EB-123456789\")\n- Requires a valid article ID. Article ID format: 2-4 letter prefix + dash + 4-15 digits (e.g., \"PROD-2996\")\n\n## Overview\nThe Get Article by ID API allows a user to retrieve a specific article using its ID. Additional article attributes and contextual views can be specified in the query parameters.\n\nThis API returns structured authoring attributes of Issue, Environment, Cause and Confidence Level when the following conditions are met:\n- The \"Allow Structured Authoring\" setting is enabled at the partition/department level\n- The \"Use Structured Authoring\" flag is set on the article type\n"
      parameters:
        - $ref: '#/components/parameters/xEgainActivityId'
        - $ref: '#/components/parameters/xExtIntegrationId'
        - $ref: '#/components/parameters/xExtInteractionId'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/portalReadableId'
        - $ref: '#/components/parameters/articleReadableId'
        - $ref: '#/components/parameters/languageQueryParameter'
        - $ref: '#/components/parameters/articleAdditionalAttributes'
        - $ref: '#/components/parameters/customAdditionalAttributes'
        - name: accessSource
          in: query
          schema:
            type: string
            enum:
              - article_view
              - article_view_more_related_Article
              - article_view_basic_search
              - article_view_adv_search
              - article_view_guided_help
              - article_view_browse_topic
              - article_view_browse_tree
              - article_view_popular_articles
              - article_view_useful_items
              - article_view_widget
              - article_view_announcement
              - article_view_bookmarked
              - article_view_subscription_notification
              - article_view_guided_help_additional_info
              - view_articles_pending_compliance
              - type_ahead_Suggestion
              - semantic_Suggestion
              - instant_answer
              - instant_answer_reference
            default: article_view
          description: "Provides information about the method in which the Article is accessed and is used for self-service analytics. Refer to the eGain User Guide regarding \"Article View Contexts\".\n\n| Name | Description \n| ---- | -----------\n| article_view | View an Article directly using its ID.\n| article_view_more_related_Article  | View related articles of an Article using its ID.\n| article_view_basic_search | View an Article via a basic search.\n| article_view_adv_search | View an Article via an advanced search.\n| article_view_guided_help | View an Article via a Guided Help solution.\n| article_view_browse_topic | View an Article via browsing a topic.\n| article_view_browse_tree | View an Article via browsing a topic tree.\n| article_view_popular_articles | View an Article using the Popular Items list in the Self-Service portal.\n| article_view_useful_items | View Article using the Useful Items list in the Self-Service portal.\n| article_view_widget | View an Article via a widget.\n| article_view_announcement | View an Article from the announcement section in the Self-Service portal.\n| article_view_bookmarked | View a bookmarked Article.\n| article_view_subscription_notification | View an Article from a subscription notification.\n| article_view_guided_help_additional_info | View an Article via additional information from a Guided Help search.\n| view_articles_pending_compliance | View an Article via Read & Sign in the Self-Service portal.\n| type_ahead_Suggestion | View an Article from a type-ahead Suggestion in the Self-Service portal.\n| semantic_Suggestion | View an Article from a semantic Suggestion in the Self-Service portal.\n| instant_answer | View an Article via an Instant Answers solution.\n| instant_answer_reference | View an Article that is used as a reference for an Instant Answers solution.\n"
          example: article_view
        - name: publishViewId
          in: query
          schema:
            type: string
            minLength: 7
            maxLength: 20
            pattern: ^[a-zA-Z0-9]{2,4}-\d{4,15}$
          description: The ID of a publish view for an Article. A publish view is a set of tags used to generate multiple editions of the same Article for display on the self-service portal. Publish views are used in conjunction with single sourcing to tailor the content of an Article to a specific audience by granting access to an Article's version to users that possess the same tags.<br><br>A publish view ID is composed of a 4-letter prefix, followed by a dash and 4-15 digits.
          examples:
            Readable Id:
              value: PROD-3203
              description: A readable publish view ID.
        - $ref: '#/components/parameters/workflowMilestone'
      responses:
        '200':
          $ref: '#/components/responses/ArticleGetByIdResponse'
        '204':
          $ref: '#/components/responses/204_common_no_content'
        '400':
          $ref: '#/components/responses/400_common_bad_request'
        '401':
          $ref: '#/components/responses/401_invalid_authorization'
        '403':
          $ref: '#/components/responses/403_scope_not_assigned'
        '404':
          $ref: '#/components/responses/404_common_not_found'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-speakeasy-server-id: server_0
      security:
        - accessToken: []
      x-speakeasy-name-override: getArticleById
      x-speakeasy-group: ""
  /portals/{portalID}/articles/announcements:
    get:
      tags:
        - Article
      summary: Get Announcement Articles
      operationId: getAnnouncementArticles
      description: "Get Announcements\n\n## How to Use This Tool\n\n**CRITICAL**: This tool requires a `request` parameter containing the request object. All parameters must be passed inside a `request` object.\n\n**Parameter Format**: \n- Always wrap parameters in a `request` object: `{\"request\": {\"portalID\": \"PZ-9999\"}}`\n- Required parameter:\n  - `portalID` (string) - The portal ID (format: 2-4 letter prefix + dash + 4-15 digits, e.g., \"PZ-9999\")\n    - Never ask the user to provide the portal ID if it can be discovered via getMyPortals.\n    - If portal context is missing or unclear, call getMyPortals and select the best match based on user's query.\n  - `acceptLanguage` (string) - Accept-Language header value\n- Optional parameters:\n  - `Dollar_lang` (string, default: \"en-US\") - Language code\n  - `Dollar_pagesize` (number, default: 10) - Number of results per page\n\n**Example**: To get announcements from portal \"PZ-9999\", call with:\n```json\n{\"request\": {\"portalID\": \"PZ-9999\", \"acceptLanguage\": \"en-US\"}}\n```\n\n**Example with optional parameters**:\n```json\n{\"request\": {\"portalID\": \"PZ-9999\", \"Dollar_lang\": \"en-US\", \"Dollar_pagesize\": 20}}\n```\n\n## Displaying Results (MCP-Specific)\n**CRITICAL**: When this tool returns data successfully, you MUST display the announcement articles to the user in your response. Do not silently process the data - always show the user what was returned.\n\n**What to display:**\n- Display all announcement articles with their names and IDs\n- Show the article content (`content` or `contentText`) for each announcement\n- Display metadata such as `createdDate`, `modifiedDate`, `articleSummary`\n- Show `attachments` if present\n- Include `paginationInfo` if pagination is used\n- Format announcements in a clear list format\n\n**Example**: \"Here are the announcements for this portal: 1) [Announcement Name] (ID: PROD-123) - [content]...\"\n\n## Prerequisites\n- Requires a valid portal ID. If you don't have the portal ID, first call 'get-portals' to get available portals.\n- Portal ID format: 2-4 letter prefix + dash + 4-15 digits (e.g., \"PROD-1004\")\n\n## Overview\nThe Get Announcements API allows a user to retrieve all announcement articles for a specific portal. Announcements are special articles that are prominently displayed to users and typically contain important updates, news, or notifications.\n\nThis API returns announcement articles with their full content, metadata, and any associated attachments or links.\n"
      parameters:
        - $ref: '#/components/parameters/xEgainActivityId'
        - $ref: '#/components/parameters/xExtIntegrationId'
        - $ref: '#/components/parameters/xExtInteractionId'
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/portalReadableId'
        - $ref: '#/components/parameters/tags'
        - $ref: '#/components/parameters/articleResultAdditionalAttributes'
        - $ref: '#/components/parameters/workflowMilestone'
        - $ref: '#/components/parameters/languageQueryParameter'
        - $ref: '#/components/parameters/pagenum'
        - $ref: '#/components/parameters/pagesize'
      responses:
        '200':
          $ref: '#/components/responses/AnnouncementArticlesResponse'
        '204':
          $ref: '#/components/responses/204_common_no_content'
        '400':
          $ref: '#/components/responses/400_common_bad_request'
        '401':
          $ref: '#/components/responses/401_invalid_authorization'
        '403':
          $ref: '#/components/responses/403_scope_not_assigned'
        '404':
          $ref: '#/components/responses/404_common_not_found'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-speakeasy-server-id: server_0
      security:
        - accessToken: []
      x-speakeasy-name-override: getAnnouncementArticles
      x-speakeasy-group: ""
  /portals/{portalID}/populararticles:
    get:
      summary: Get Popular Articles
      operationId: getpopulararticles
      tags:
        - Popular Articles
      description: "Get Popular Articles\n\n## How to Use This Tool\n\n**CRITICAL**: This tool requires a `request` parameter containing the request object. All parameters must be passed inside a `request` object.\n\n**Parameter Format**: \n- Always wrap parameters in a `request` object: `{\"request\": {\"portalID\": \"PZ-9999\"}}`\n- Required parameter:\n  - `portalID` (string) - The portal ID (format: 2-4 letter prefix + dash + 4-15 digits, e.g., \"PZ-9999\")\n    - Never ask the user to provide the portal ID if it can be discovered via getMyPortals.\n    - If portal context is missing or unclear, call getMyPortals and select the best match based on user's query.\n  - `acceptLanguage` (string) - Accept-Language header value\n- Optional parameters:\n  - `Dollar_lang` (string, default: \"en-US\") - Language code\n  - `Dollar_pagenum` (number, default: 1) - Page number for pagination\n  - `Dollar_pagesize` (number, default: 10) - Number of results per page\n  - `dollarFilterTopicId` (string) - Filter by topic ID\n  - `dollarFilterTags` (string) - Comma-separated list of Tag/Tag Group IDs\n\n**Example**: To get popular articles from portal \"PZ-9999\", call with:\n```json\n{\"request\": {\"portalID\": \"PZ-9999\", \"acceptLanguage\": \"en-US\"}}\n```\n\n**Example with optional parameters**:\n```json\n{\"request\": {\"portalID\": \"PZ-9999\", \"Dollar_lang\": \"en-US\", \"Dollar_pagesize\": 20}}\n```\n\n## Displaying Results (MCP-Specific)\n**CRITICAL**: When this tool returns data successfully, you MUST display the popular articles to the user in your response. Do not silently process the data - always show the user what was returned.\n\n**What to display:**\n- Display all popular articles with their names and IDs\n- Show article summaries or descriptions when available\n- Display metadata such as `articleType`, `createdDate`, `modifiedDate`\n- Show `imageURL` if available (mention thumbnail availability)\n- Include `paginationInfo` if pagination is used\n- Format articles in a numbered or bulleted list\n\n**Example**: \"Here are the most popular articles: 1) [Article Name] (ID: PROD-123) - [summary]...\"\n\n## Prerequisites\n- Requires a valid portal ID. If you don't have the portal ID, first call 'get-portals' to get available portals.\n- Portal ID format: 2-4 letter prefix + dash + 4-15 digits (e.g., \"EB-123456789\")\n\n## Overview\nThe Popular Articles API allows a user to retrieve the most popular articles from a specific portal. Popular articles are typically determined by user engagement metrics such as views, ratings, or usage frequency.\n\nThis API returns a list of popular articles with their metadata, allowing users to discover the most relevant and frequently accessed content within the portal.\n"
      parameters:
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/xExtIntegrationId'
        - $ref: '#/components/parameters/xEgainActivityId'
        - $ref: '#/components/parameters/xExtInteractionId'
        - $ref: '#/components/parameters/portalReadableId'
        - $ref: '#/components/parameters/filterTopicId'
        - $ref: '#/components/parameters/languageQueryParameter'
        - $ref: '#/components/parameters/tags'
        - $ref: '#/components/parameters/pagenum'
        - $ref: '#/components/parameters/pagesize'
        - $ref: '#/components/parameters/articleResultAdditionalAttributes'
      responses:
        '200':
          $ref: '#/components/responses/GetPopularArticlesResponse'
        '204':
          $ref: '#/components/responses/204_common_no_content'
        '400':
          $ref: '#/components/responses/400_common_bad_request'
        '401':
          $ref: '#/components/responses/401_invalid_authorization'
        '403':
          $ref: '#/components/responses/403_scope_not_assigned'
        '404':
          $ref: '#/components/responses/404_common_not_found'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-speakeasy-server-id: server_0
      security:
        - accessToken: []
      x-speakeasy-name-override: getPopularArticles
      x-speakeasy-group: ""
  /myportals:
    get:
      summary: Get All Portals Accessible To User
      operationId: getMyPortals
      tags:
        - Portal
      description: "Get All Portals Accessible to User\n\n## Overview\nRetrieves the list of portals available to the authenticated user or application. Each portal contains a readable portal ID that is required by almost all other Portal Manager APIs.\n\n- If no access tags are specified for a portal, any user can access the portal.\n- If access tags are specified for a portal, users with a user profile that allows access can access the portal. For users with multiple user profiles, the user profile that allows access does not need to be the active user profile.\n- Global users (partition) cannot be assigned user profiles; their access is limited to portals without access restrictions.\n- The only articles returned are associated to an Article type when the parameter “Include in browse on portals” is set to \"Yes\".\n- When the `shortUrlTemplate` query parameter is provided, the API filters accessible portals according to the specified language and template name. A portal short URL specific to the `shortUrlTemplate` value is returned in the response when available. If there is no short URL for a language, the portal object returns an empty `shortURL` field.\n\n## Prerequisites\nAuthentication is required. No portal ID is needed for this call. This is typically the first API you should call before using any other tool.\n\n## How to Use This Tool\n- Call this endpoint to discover which portals you have access to. Use the returned portal IDs as inputs to Retrieve, Answers, Search, Article, and Suggestion APIs.\n\n## Parameter Requirements\nThis tool requires **both** a query language parameter **and** an HTTP language header. An empty request object is **invalid** and MUST NOT be used.\n\n### Required (both MUST be provided)\n- `Dollar_lang` (string, default: \"en-US\") - Language code\n- `acceptLanguage` (string) - Accept-Language header value\n\nBoth parameters **MUST** be present on every invocation.  \nIf either parameter is missing, the request is invalid.\n\n#### Optional\n\n- `Dollar_pagenum` — Page number to retrieve (defaults to `1` if omitted)\n- `Dollar_pagesize` — Number of items per page (server default applied if omitted)\n\n**Example**: To get all portals accessible to the user, call with:\n```json\n{\"request\": {\"Dollar_lang\": \"en-US\", \"acceptLanguage\": \"en-US\"}}\n```\n\n## Overview\nThe Get All Portals Accessible to User API allows a user to fetch all portals accessible to the user across all departments.\n\n## Pagination behavior (CRITICAL for AI assistants)\n\n**IMPORTANT**: This endpoint is paginated. When searching for a portal by name or listing portals, you MUST automatically fetch ALL pages before concluding that a portal doesn't exist.\n\n### Automatic pagination is REQUIRED when:\n- User asks to find a portal by name (e.g., \"business portal\", \"Master portal\")\n- User requests to list or see all portals\n- You need to resolve a natural portal name to its ID\n\n### How to detect more pages exist:\nThe response includes `paginationInfo` with:\n- `count`: Total number of items across all pages\n- `pagenum`: Current page number\n- `pagesize`: Items per page (default: 25)\n\n**Check for more pages if ANY of these are true:**\n1. The number of portals returned equals `pagesize` (e.g., exactly 25 portals returned)\n2. `paginationInfo.count > (pagenum * pagesize)` - there are more items beyond this page\n3. The response includes a `link` array with a `next` relation\n\n### Required pagination workflow:\n1. Start with `$pagenum=1` and `$pagesize=25` (default)\n2. After receiving the response, check `paginationInfo`\n3. **If more pages exist** (using the checks above), automatically call this endpoint again with `$pagenum=2`, then `$pagenum=3`, etc.\n4. Continue incrementing `$pagenum` until:\n   - A page returns fewer portals than `pagesize` (indicating the last page)\n   - A page returns zero portals\n   - `pagenum * pagesize >= paginationInfo.count` (if count represents total items)\n5. Merge all portals from all pages by unique portal ID\n6. Only then search through the complete merged list or report results to the user\n\n### Example scenario:\nIf you search for \"business portal\" and the first page returns 25 portals but none match:\n- DO NOT immediately tell the user the portal doesn't exist\n- Check `paginationInfo.count` - if it's > 25, automatically fetch page 2\n- Continue fetching until all pages are retrieved\n- Search the complete merged list before concluding the portal doesn't exist\n\nThis ensures reliable portal name-to-ID resolution and prevents false \"not found\" errors.\n\n## Displaying Results (MCP-Specific)\nAlways display the list of portals returned. Show portal name, portal ID, and any descriptive metadata. If multiple portals exist, prompt the user to select one for subsequent calls.\n"
      parameters:
        - $ref: '#/components/parameters/acceptLanguage'
        - $ref: '#/components/parameters/mandatoryLanguageQueryParameter'
        - name: department
          description: The Name of the department for which portals are to be fetched
          in: query
          required: false
          schema:
            type: string
            example: service
            pattern: ^[\w\W]+$
            minLength: 0
            maxLength: 255
        - name: filterText
          description: Portal name starting with a specific character are considered to filter the result.
          in: query
          required: false
          schema:
            type: string
            example: master
            pattern: ^[\w\W]+$
            minLength: 0
            maxLength: 255
        - name: shortUrlTemplate
          description: The Name of the template used while creating Short URL.
          in: query
          required: false
          schema:
            type: string
            example: silver
            pattern: ^[\w\W]+$
            minLength: 0
            maxLength: 255
        - $ref: '#/components/parameters/sortIdNameDepartment'
        - $ref: '#/components/parameters/order'
        - $ref: '#/components/parameters/pagenum'
        - $ref: '#/components/parameters/pagesizeNewFrameWork'
      responses:
        '200':
          $ref: '#/components/responses/GetAllPortalsAccessibleToAgentResponse'
        '204':
          description: No Content If all the portals are personalized and user does not have any profile assigned
        '400':
          $ref: '#/components/responses/400_common_bad_request'
        '401':
          $ref: '#/components/responses/401_invalid_authorization'
        '403':
          $ref: '#/components/responses/403_scope_not_assigned'
        '404':
          $ref: '#/components/responses/404_common_not_found'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-speakeasy-server-id: server_0
      security:
        - accessToken: []
      x-speakeasy-name-override: getMyPortals
      x-speakeasy-group: ""
  /{portalID}/search:
    get:
      summary: Hybrid Search
      tags:
        - Search
      operationId: aiSearch
      description: "Hybrid Search\n\n## How to Use This Tool\n\n**CRITICAL**: This tool requires a `request` parameter containing the request object. All parameters must be passed inside a `request` object.\n\n**Parameter Format**: \n- Always wrap parameters in a `request` object: `{\"request\": {\"portalID\": \"PZ-9999\", \"q\": \"loan information\"}}`\n- Required parameters:\n  - `portalID` (string) - The portal ID (format: 2-4 letter prefix + dash + 4-15 digits, e.g., \"PZ-9999\")\n    - Never ask the user to provide the portal ID if it can be discovered via getMyPortals.\n    - If portal context is missing or unclear, call getMyPortals and select the best match based on user's query.\n  - `q` (string) - The search query string (must be URL-escaped)\n  - `Dollar_lang` (string, default: \"en-US\") - Language code\n- Optional parameters:\n  - `dollarFilterUserProfileID` (string) - User profile ID filter\n  - `dollarFilterTags` (object) - Object where keys are Category Tag IDs and values are arrays of Tag IDs\n  - `dollarFilterTopicIds` (array) - Array of topic IDs to filter by\n  - `articleCustomAdditionalAttributes` (string) - Comma-separated custom attribute names\n  - `Dollar_pagenum` (number, default: 1) - Page number for pagination\n  - `Dollar_pagesize` (number, default: 20) - Number of results per page\n\n**Example**: To search for \"loan information\" in portal \"PZ-9999\", call with:\n```json\n{\"request\": {\"portalID\": \"PZ-9999\", \"q\": \"loan information\", \"Dollar_lang\": \"en-US\"}}\n```\n\n**Example with optional parameters**:\n```json\n{\"request\": {\"portalID\": \"PZ-9999\", \"q\": \"loan information\", \"Dollar_lang\": \"en-US\", \"Dollar_pagesize\": 25}}\n```\n\n**Note**: This endpoint is only available for Self Service environments.\n\n## Displaying Results (MCP-Specific)\n**CRITICAL**: When this tool returns data successfully, you MUST display the search results to the user in your response. Do not silently process the data - always show the user what was returned.\n\n**What to display:**\n- Display all search results with article names and IDs\n- Show article `snippet` or `keywordSnippet` (the relevant text excerpt)\n- Display `normalizedScore` or `relevanceScore` to indicate relevance\n- Show `docType`, `source`, and `topicBreadcrumb` metadata\n- Display `contextualSummary` if available\n- Include `paginationInfo` if pagination is used\n- Format results in a numbered list with clear relevance indicators\n\n**Example**: \"I found 10 articles matching 'loan information': 1) [Article Name] (ID: PROD-123) - [snippet] (Relevance: 0.89)...\"\n\n## Overview\nThe Search API is a hybrid search service that combines semantic understanding with keyword precision to deliver fast, contextual, and relevant results from your enterprise knowledge base. It enables secure, role-aware access to articles, FAQs, and documentation across customer, agent, and employee interfaces. Each query returns a ranked list of results with snippets, metadata, and relevance scores.\n"
      parameters:
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/portalReadableId'
        - $ref: '#/components/parameters/filterUserProfileID'
        - $ref: '#/components/parameters/languageCode'
        - $ref: '#/components/parameters/filterTags'
        - $ref: '#/components/parameters/filterTopicIds'
        - $ref: '#/components/parameters/articleCustomFields'
        - $ref: '#/components/parameters/aispagenum'
        - $ref: '#/components/parameters/aispagesize'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
