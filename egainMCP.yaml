          pattern: ^[\w\W]+$
        size:
          type: integer
          format: int64
          description: The size of the attachment in bytes. The maximum size is limited to 25MB.
          minimum: 1
          maximum: 2.62144e+07
        type:
          description: The type of attachment.
          type: string
          enum:
            - INTERNAL
            - EXTERNAL
        link:
          $ref: '#/components/schemas/Link'
    Edition:
      type: object
      properties:
        id:
          description: The ID of the article edition.<br>An edition ID is composed of a 4-letter prefix, followed by a dash and 4-15 digits.
          type: string
          minLength: 7
          maxLength: 20
          pattern: ^[a-zA-Z0-9]{2,4}-\d{4,15}$
        name:
          description: The alphanumeric name of the edition.
          type: string
          minLength: 1
          maxLength: 510
          pattern: ^[\w\W]+$
        isContentEdition:
          description: |-
            <li>The presence of this element indicates that this edition is the one corresponding to the returned content.</li>
            <li>This can only be true for at most one <edition> element in the list of editions.</li>
            <li>This parameter must only be returned if article content is returned as well.</li>
            <li>The only allowed value is *true*. The absence of this parameter in the response indicates *false*.</li>
          type: boolean
        publishProfile:
          title: Publish Profile
          type: object
          properties:
            id:
              type: string
              minLength: 7
              maxLength: 20
              pattern: ^[a-zA-Z0-9]{2,4}-\d{4,15}$
              description: The ID of the Publish Profile.<br>An Publish Profile ID is composed of a 2-4 letter prefix, followed by a dash and 4-15 digits.
            name:
              properties: {}
              description: The name of the profile.
              type: string
              minLength: 1
              maxLength: 255
              pattern: ^[a-zA-Z0-9]+$
          required:
            - id
            - name
          description: The publish view associated with this edition.
        link:
          $ref: '#/components/schemas/Link'
      description: This schema contains information about an article edition.
      title: Edition
    createdBy:
