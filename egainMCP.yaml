      properties:
        id:
          type: string
          pattern: ^[a-zA-Z0-9]{2,4}-\d{4,15}$
          description: The alphanumeric ID of the topic.<br><br>A topic ID is composed of a 2-4 letter prefix, followed by a dash and 4-15 digits.
          minLength: 7
          maxLength: 20
